<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Map Pro</title>
    <!-- Diagnostic Error Catcher (Will catch startup errors) -->
    <script>
        window.addEventListener('error', function(e) {
            alert('JS Error: ' + e.message + '\nFile: ' + e.filename + '\nLine: ' + e.lineno);
        });
    </script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="addressSidebar" class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-title-row">
            <h3>Delivery Stops</h3>
            <button id="closeSidebarBtn" title="Close Panel">&times;</button>
        </div>
    </div>
        <div id="addressListContainer" class="address-list-content">
            <p class="empty-state-text">No scanned addresses yet. Click the camera icon above to scan a delivery
                manifest screen.</p>
        </div>
        <div class="sidebar-footer">
            <button id="startRouteBtn" class="start-btn">Start Route</button>
            <button id="clearAddressesBtn" class="clear-btn">Clear</button>
        </div>
    </div>

    <div id="map"></div>

    <div class="gmaps-top-search">
        <input id="searchInput" type="text" class="gmaps-search-input" placeholder="Search places or addresses">
        <button id="apiKeyBtn" class="search-icon-btn" type="button" title="Set Gemini API Key">🔑</button>
        <button id="scanButton" class="search-icon-btn" type="button" title="Upload Manifest">&#128193</button>
        <button id="searchButton" class="search-icon-btn" type="button">🔍</button>
    </div>

    <button id="openSidebarBtn" class="open-sidebar-tab dots-toggle-btn" title="Open Delivery Stops">⋮</button>

    <input id="fileInput" type="file" accept="image/*" style="display: none;">

    <div class="gmaps-view-switcher" role="toolbar" aria-label="Map view controls">
        <button id="mapViewBtn" class="view-pill active" type="button">Map</button>
        <button id="satelliteViewBtn" class="view-pill" type="button">Satellite</button>
    </div>

    <div class="gmaps-floating-actions">
        <button id="locateButton" class="action-circle-btn" type="button">&#128205</button>
    </div>

    <div id="statusBar" class="gmaps-status">Finding your location…</div>

    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <!-- Clean Cache Buster to force reload -->
    <script src="app.js?v=99"></script>
</body>

</html>
